# Data Configuration
data:
  raw_data_path: "dataset.csv"
  train_data_path: "artifacts/train.csv"
  test_data_path: "artifacts/test.csv"
  test_size: 0.2
  random_state: 42

# Preprocessing Configuration
preprocessing:
  target_column: "Churn"
  id_column: "customerID"
  numerical_features:
    - "tenure"
    - "MonthlyCharges"
    - "TotalCharges"
  categorical_features:
    - "gender"
    - "SeniorCitizen"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "Contract"
    - "PaperlessBilling"
    - "PaymentMethod"
  
# Model Training Configuration
model_training:
  models:
    logistic_regression:
      params:
        C: [0.1, 1, 10]
        max_iter: [1000]
    decision_tree:
      params:
        max_depth: [5, 10, 15, 20]
        min_samples_split: [2, 5, 10]
    random_forest:
      params:
        n_estimators: [100, 200]
        max_depth: [10, 20, None]
        min_samples_split: [2, 5]
    gradient_boosting:
      params:
        n_estimators: [100, 200]
        learning_rate: [0.01, 0.1]
        max_depth: [3, 5]
    xgboost:
      params:
        n_estimators: [100, 200]
        learning_rate: [0.01, 0.1]
        max_depth: [3, 5, 7]

# Paths
paths:
  artifacts_dir: "artifacts"
  logs_dir: "logs"
  models_dir: "artifacts/models"
  preprocessor_path: "artifacts/preprocessor.pkl"
  best_model_path: "artifacts/models/best_model.pkl"
  metrics_path: "artifacts/metrics.json"
  predictions_path: "artifacts/predictions.csv"
